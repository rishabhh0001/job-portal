{% extends "base.html" %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-220px)] flex items-center justify-center px-6 py-20">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black">Create an account</h1>
            <p class="text-slate-500 mt-2 text-sm">Join JobPortal today — it's free</p>
        </div>
        <div class="bg-surface border border-border rounded-2xl p-8">
            <form action="{{ url_for('register') }}" method="POST" class="space-y-5" id="reg-form">
                <div>
                    <label for="name"
                        class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Full
                        Name</label>
                    <input id="name" name="name" type="text" required placeholder="John Doe"
                        class="w-full bg-bg-dark border border-border rounded-lg px-4 py-3 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
                </div>
                <div>
                    <label for="email"
                        class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Email</label>
                    <input id="email" name="email" type="email" required placeholder="you@example.com"
                        class="w-full bg-bg-dark border border-border rounded-lg px-4 py-3 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">I am
                        a</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label
                            class="flex items-center justify-center gap-2 p-3 border border-border rounded-lg cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/10">
                            <input type="radio" name="role" value="seeker" class="sr-only" checked />
                            <span class="material-symbols-outlined text-lg text-slate-400">person_search</span>
                            <span class="text-sm font-semibold">Job Seeker</span>
                        </label>
                        <label
                            class="flex items-center justify-center gap-2 p-3 border border-border rounded-lg cursor-pointer hover:border-primary/50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/10">
                            <input type="radio" name="role" value="employer" class="sr-only" id="employer-radio" />
                            <span class="material-symbols-outlined text-lg text-slate-400">business</span>
                            <span class="text-sm font-semibold">Employer</span>
                        </label>
                    </div>
                </div>
                <div id="company-field" class="hidden">
                    <label for="company_name"
                        class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Company
                        Name</label>
                    <input id="company_name" name="company_name" type="text" placeholder="Acme Corp"
                        class="w-full bg-bg-dark border border-border rounded-lg px-4 py-3 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
                </div>
                <div>
                    <label for="password"
                        class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <input id="password" name="password" type="password" required placeholder="At least 8 characters"
                        class="w-full bg-bg-dark border border-border rounded-lg px-4 py-3 text-sm text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" />
                    <div class="mt-2.5 space-y-1.5" id="strength-ui" style="display:none">
                        <div class="flex gap-1.5 h-1.5">
                            <div id="bar1" class="flex-1 rounded-full bg-slate-800 transition-all duration-300"></div>
                            <div id="bar2" class="flex-1 rounded-full bg-slate-800 transition-all duration-300"></div>
                            <div id="bar3" class="flex-1 rounded-full bg-slate-800 transition-all duration-300"></div>
                        </div>
                        <p id="strength-label" class="text-[11px] text-slate-500"></p>
                    </div>
                </div>
                <button type="submit"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 rounded-lg text-sm transition-all shadow-lg shadow-primary/20">
                    Create Account
                </button>
            </form>
        </div>
        <p class="text-center text-sm text-slate-500 mt-6">
            Already have an account? <a href="{{ url_for('login') }}"
                class="text-primary font-semibold hover:underline">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.querySelectorAll('input[name="role"]').forEach(radio => {
        radio.addEventListener('change', function () {
            document.getElementById('company-field').classList.toggle('hidden', this.value !== 'employer');
        });
    });

    const passwordInput = document.getElementById('password');
    const strengthUI = document.getElementById('strength-ui');
    const bar1 = document.getElementById('bar1');
    const bar2 = document.getElementById('bar2');
    const bar3 = document.getElementById('bar3');
    const label = document.getElementById('strength-label');

    const colors = { weak: '#e24c71', medium: '#f39845', strong: '#57c558' };

    function getStrength(pw) {
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
        if (/\d/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;
        if (score <= 1) return 'weak';
        if (score <= 2) return 'medium';
        return 'strong';
    }

    function updateBars(strength) {
        const c = colors[strength];
        const levels = { weak: [c, '', ''], medium: [c, c, ''], strong: [c, c, c] };
        [bar1, bar2, bar3].forEach((bar, i) => {
            bar.style.background = levels[strength][i] || '';
            bar.style.backgroundColor = levels[strength][i] || 'rgba(51,65,85,1)';
        });
        const labels = { weak: 'Weak — add numbers and symbols', medium: 'Fair — add uppercase or symbols', strong: 'Strong password' };
        label.textContent = labels[strength];
        label.style.color = c;
    }

    passwordInput.addEventListener('input', function () {
        if (this.value.length === 0) {
            strengthUI.style.display = 'none';
            return;
        }
        strengthUI.style.display = 'block';
        updateBars(getStrength(this.value));
    });
</script>
{% endblock %}
