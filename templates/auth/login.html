{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
    :root {
        --login-primary: #2d7fd2;
        --login-muted: #64748b;
    }

    .login-container {
        position: relative;
        overflow: hidden;
        min-height: calc(100vh - 80px);
        /* Adjust based on your header height */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 0;
    }

    .blob,
    .orbit {
        position: absolute;
        z-index: 0;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    .blob {
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(45, 127, 210, 0.15) 0%, rgba(45, 127, 210, 0) 70%);
        filter: blur(80px);
        opacity: 0.6;
    }

    @keyframes spin {
        100% {
            transform: translate(-50%, -50%) rotate(1turn);
        }
    }

    .orbit {
        width: 600px;
        height: 600px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 50%;
        animation: spin 60s infinite linear;
    }

    .orbit::before,
    .orbit::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(45, 127, 210, 0.4);
        box-shadow: 0 0 15px rgba(45, 127, 210, 0.6);
    }

    .orbit::before {
        top: 50%;
        left: -6px;
    }

    .orbit::after {
        top: 50%;
        right: -6px;
    }

    .login-card {
        position: relative;
        z-index: 10;
        background: rgba(13, 23, 33, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 60px 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .textbox {
        position: relative;
        margin-bottom: 24px;
    }

    .textbox input {
        width: 100%;
        height: 54px;
        background: rgba(255, 255, 255, 0.04);
        border: none;
        border-radius: 12px;
        padding: 20px 16px 0;
        color: #f1f5f9;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
        border: 1px solid transparent;
    }

    .textbox label {
        position: absolute;
        top: 50%;
        left: 16px;
        transform: translateY(-50%);
        color: var(--login-muted);
        font-size: 15px;
        pointer-events: none;
        transition: all 0.3s ease;
        transform-origin: left top;
    }

    .textbox input:focus {
        background: rgba(255, 255, 255, 0.06);
        border-color: var(--login-primary);
        box-shadow: 0 0 0 4px rgba(45, 127, 210, 0.1);
    }

    /* Floating label logic */
    .textbox input:focus~label,
    .textbox input:not(:placeholder-shown)~label {
        transform: translateY(-22px) scale(0.75);
        color: var(--login-primary);
    }

    .btn-login {
        width: 100%;
        height: 54px;
        background: var(--login-primary);
        color: white;
        border-radius: 12px;
        font-weight: 700;
        font-size: 16px;
        transition: all 0.3s ease;
        margin-top: 8px;
        box-shadow: 0 10px 15px -3px rgba(45, 127, 210, 0.3);
    }

    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 25px -5px rgba(45, 127, 210, 0.4);
        filter: brightness(1.1);
    }

    .btn-login:active {
        transform: translateY(0);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="blob"></div>
    <div class="orbit"></div>

    <div class="login-card">
        <div class="text-center mb-10">
            <div
                class="size-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-primary/20">
                <span class="material-symbols-outlined text-primary text-3xl font-variation-fill">person</span>
            </div>
            <h2 class="text-2xl font-black text-white">Welcome back!</h2>
            <p class="text-slate-500 text-sm mt-1">Let's get you logged in</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="textbox">
                <input type="email" name="email" id="email" required placeholder=" " autocomplete="email">
                <label for="email">Email Address</label>
            </div>

            <div class="textbox">
                <input type="password" name="password" id="password" required placeholder=" "
                    autocomplete="current-password">
                <label for="password">Password</label>
            </div>

            <div class="flex items-center justify-between mb-8 px-1">
                <label class="flex items-center gap-2 text-sm text-slate-400 cursor-pointer group">
                    <input type="checkbox" name="remember"
                        class="size-4 rounded border-slate-700 bg-slate-800 text-primary focus:ring-primary focus:ring-offset-bg-dark transition-all">
                    <span class="group-hover:text-slate-300 transition-colors">Remember me</span>
                </label>
                <a href="#"
                    class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors">Forgot?</a>
            </div>

            <button type="submit" class="btn-login">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-10">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="text-primary font-bold hover:underline ml-1">Register</a>
        </p>
    </div>
</div>
{% endblock %}
